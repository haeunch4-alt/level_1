<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="">
    <meta name="description" content="">
    <title>링크태그</title>
</head>
<body>
    <h1>링크태그</h1>
    <h2>절대경로</h2>
    <p>http://로 시작하는 실제 웹 서비스 주소</p>
    <a href="https://google.com" target="_blank">구글 바로가기</a>
    <a href="https://naver.com" target="_blank">네이버 바로가기</a>
    <a href="https://apple.com" target="_blank">애플 바로가기</a>
    <!-- 네이버 쇼핑탭 클론코딩 -->
    <div id="shopping_wrap">
        <!-- 1. 쇼핑 제목 탭 -->
        <div class="title_controls_wrap">
            <div id="title_menu">
                <a href="#" target="blank">쇼핑</a><img src="" alt="">
                <a href="#" target="blank">맨즈</a><img src="" alt="">
                <a href="#" class="active">브랜드샵</a><img src="" alt="">
                <a href="#" target="blank">MY추천</a><img src="" alt="">
                <a href="#" target="blank">추천핫딜</a><img src="" alt="">
                <a href="#" target="blank">쇼핑라이브</a>
            </div><!-- e:title_menu -->
            <div id="title_plus">
                <em class="current_page">1</em><span class="total_page">/12</span>
                <a href="#" class="prev_btn"><img src="" alt="이전페이지 보기"></a>
                <a href="#" class="next_btn"><img src="" alt="다음페이지 보기"></a>
            </div><!-- e:title_plus -->
        </div><!-- e:title_controls_wrap -->
        <!-- 2. 쇼핑 내용(광고, 주문, 추천태그, 상품목록) -->
        <div class="container">
            <div class="sidebar">
                <div class="brand">
                    <a href="#" target="blank"><em>쿠팡</em></a>
                    <a href="#" target="blank">G마켓</a>
                    <a href="#" target="blank">옥션</a>
                    <a href="#" target="blank">11번가</a>
                    <a href="#" target="blank">올리브영</a>
                    <a href="#" target="blank">SSG닷컴</a>
                    <a href="#" target="blank">하프클럽</a>
                    <a href="#" target="blank">이마트몰</a>
                    <a href="#" target="blank">GS SHOP</a>
                    <a href="#" target="blank">패션플러스</a>
                </div><!-- e:brand -->
                <div class="myhome">
                    <a href="#" class="order">주문배송<img src="" alt="3"></a> 
                    <img src="" alt="">| <!-- 중간 | -->
                    <a href="#" class="cart">장바구니<img src="" alt="1"></a> 
                </div><!-- e:myhome -->
                <div class="tags">
                    <a href="#" class="active">#출산/육아</a> <img src="" alt="">
                    <a href="#">#화장품/미용</a>
                    <a href="#">#가구/인테리어</a>
                    <a href="#">#생활/건강</a>
                    <a href="#">#패션잡화</a>
                    <a href="#">#식품</a>
                </div><!--e: tags -->
            </div><!-- e: 2행 1열 sidebar --> 
            <div class="right_contents">
                <a href="#" class="product">
                    <p class="photo"><img src="" alt=""></p>
                    <p class="msg">불만족 시 반품가능</p>
                    <h2>자누아 경추베개</h2>
                    <div class="riview_score_wrap"> 
                        <p class="score"><img src="" alt="별점">4.79</p>
                        <p class="review">리뷰 225</p>
                    </div>
                </a><!-- *8 -->
            </div><!-- e:2행 2열right_contents -->
        </div><!--e:2행 전체container  -->
        <!-- 3. 내용 더보기 -->
        <div class="more_wrap">
            <div class="center">
                <a href="#" class="prev_btn"><img src="" alt="이전보기"></a>
                <div class="recomand">
                    <em>MY추천</em><span>더보기</span>
                    <em class="current_page">1</em>
                    <span class="total_page">/9</span>
                </div>
                <a href="#" class="next_btn"><img src="" alt="다음보기"></a>
            </div>
            <a href="#" class="ad_btn">AD</a>
        </div>
    </div><!-- e: 전체 shopping_wrap -->
</body>
</html>
